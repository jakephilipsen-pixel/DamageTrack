version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: damagetrack
      POSTGRES_PASSWORD: damagetrack_secret
      POSTGRES_DB: damagetrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U damagetrack"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://damagetrack:damagetrack_secret@db:5432/damagetrack
      SESSION_SECRET: change-me-in-production-use-a-real-secret
      NODE_ENV: production
      PORT: "3010"
      CORS_ORIGIN: ""
    volumes:
      - uploads:/app/uploads
    ports:
      - "127.0.0.1:3010:3010"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "127.0.0.1:8084:80"

volumes:
  pgdata:
  uploads:
