version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: damagetrack
      POSTGRES_PASSWORD: damagetrack_secret
      POSTGRES_DB: damagetrack
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U damagetrack"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_dev:
